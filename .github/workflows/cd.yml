name: CD

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"

jobs:
  deploy-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/bd-lab-1-6:latest"
          docker pull "$IMAGE"

      - name: Start Qdrant
        run: |
          docker run -d -p 6333:6333 \
            -e QDRANT__SERVICE__API_KEY=${{ secrets.QDRANT_API_KEY }} \
            --name qdrant \
            qdrant/qdrant

      - name: Run API container
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/bd-lab-1-6:latest"
          docker run -d --rm \
            --name fashion_api \
            -p 8000:8000 \
            -e QDRANT_HOST=host.docker.internal \
            -e QDRANT_PORT=${{ secrets.QDRANT_PORT }} \
            -e QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }} \
            "$IMAGE"

      - name: Wait for API
        run: sleep 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install httpx
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run functional scenario
        run: |
          python tools/run_scenario.py scenario.json

      - name: Logs on failure
        if: failure()
        run: docker logs fashion_api || true

      - name: Stop containers
        if: always()
        run: |
          docker stop fashion_api || true
          docker stop qdrant || true